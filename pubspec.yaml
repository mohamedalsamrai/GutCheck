name: gutcheck
description: A local-first diet and digestive health tracker.
license: AGPL-3.0-or-later
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database (local, on-device)
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.4
  hive_flutter: ^1.1.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Charts
  fl_chart: ^0.68.0

  # Image capture
  image_picker: ^1.1.2

  # Export / sharing
  share_plus: ^12.0.0
  file_picker: ^8.1.2

  # Preferences (seed guard)
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "gutcheck.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/seed/ingredients.json
